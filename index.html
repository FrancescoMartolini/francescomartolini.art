<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Francesco Martolini .art — Il tempo lascia tracce. Io le cerco.">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FM.art">
  <meta property="og:title" content="Francesco Martolini .art">
  <meta property="og:description" content="Il tempo lascia tracce. Io le cerco.">
  <meta property="og:type" content="website">

  <title>Francesco Martolini .art</title>

  <!-- Favicon base (aggiornata dinamicamente da JS) -->
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.svg">
  <link rel="manifest" href="images/manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/stile.css">
</head>
<body>

  <!-- ══════════════════════════════
       HEADER
       ══════════════════════════════ -->
  <header id="site-header" role="banner">

    <span class="menu-logo" role="button" tabindex="0" aria-label="Torna all'inizio">
      <span class="logo-sinistra">
        <span>Francesco</span>
        <span>Martolini</span>
      </span>
      <span class="logo-destra">.art</span>
    </span>


    <!-- Menu desktop -->
    <nav role="navigation" aria-label="Menu principale">
      <ul class="menu-voci">
        <li><a href="#" data-capitolo="progetti">Progetti</a></li>
        <li><a href="#" data-capitolo="intervalli">Intervalli</a></li>
        <li><a href="#" data-capitolo="chi sono">Chi sono</a></li>
        <li><a href="#" data-capitolo="commerciali">Fotografie commerciali</a></li>
        <li><a href="#" data-capitolo="taccuino">Taccuino</a></li>
        <li><div class="menu-dot" aria-hidden="true"></div></li>
        <!--<li>
          <button id="translate-btn" onclick="attivaTranslate()"
            style="background:none;border:none;font-size:11px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--grigio-testo);cursor:pointer;">
            EN
          </button>
        </li>-->
      </ul>

      <!-- Toggle tema chiaro/scuro -->
      <button id="tema-toggle" aria-label="Cambia tema" title="Tema chiaro / scuro">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </nav>

  </header>

  <!-- ══════════════════════════════
       LIBRO (area centrale)
       ══════════════════════════════ -->
  <main id="libro" role="main" aria-label="Il libro fotografico">
    <!-- Generato da JavaScript -->
  </main>

  <!-- ══════════════════════════════
       INDICATORE LATERALE
       ══════════════════════════════ -->
  <div id="indicatore" role="navigation" aria-label="Indicatore pagine"></div>

  <!-- ══════════════════════════════
       FOOTER — frecce + numero
       ══════════════════════════════ -->
  <footer id="site-footer" role="navigation" aria-label="Navigazione pagine">
    <button class="freccia freccia-sx" id="freccia-sx" aria-label="Pagina precedente">Indietro</button>
    <span id="numero-nav" aria-label="Pagina corrente">01</span>
    <button class="freccia freccia-dx" id="freccia-dx" aria-label="Pagina successiva">Avanti</button>
  </footer>

  <!-- ══════════════════════════════
       TOUCH HINT (mobile)
       ══════════════════════════════ -->
  <p id="touch-hint" aria-hidden="true">Scorri per sfogliare</p>

  <!-- ══════════════════════════════
       OVERLAY — Pagina progetto
       ══════════════════════════════ -->
  <article id="pagina-progetto" aria-label="Dettaglio progetto" aria-hidden="true">
    <div class="progetto-interno"></div>
  </article>

  <!-- ══════════════════════════════
       OVERLAY — Archivio taccuino
       ══════════════════════════════ -->
  <section id="pagina-taccuino-archivio" aria-label="Archivio taccuino" aria-hidden="true">
    <div class="taccuino-archivio-interno"></div>
  </section>

  <!-- ══════════════════════════════
       COOKIE BANNER
       ══════════════════════════════ -->
  <div id="cookie-banner" role="dialog" aria-label="Informativa cookie" aria-live="polite">
    <p class="cookie-testo">
      Questo sito usa solo cookie tecnici essenziali per il funzionamento.
      Nessun cookie di profilazione o tracciamento.
    </p>
    <div class="cookie-azioni">
      <button class="cookie-btn cookie-btn-rifiuta" id="cookie-rifiuta">Solo essenziali</button>
      <button class="cookie-btn cookie-btn-accetta" id="cookie-accetta">Ho capito</button>
    </div>
  </div>

  <!-- Google Translate 
  <div id="google_translate_element" style="display:none"></div>-->

  <script src="js/libro.js"></script>
</body>
</html>
